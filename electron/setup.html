<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuración TPV MultiShop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3d;
      border-radius: 12px;
      padding: 40px;
      width: 440px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4f6ef7;
      margin-bottom: 16px;
    }
    .divider { border-top: 1px solid #2a2d3d; margin: 24px 0; }
    label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 6px; }
    input, select {
      width: 100%;
      padding: 10px 14px;
      background: #0f1117;
      border: 1px solid #2a2d3d;
      border-radius: 8px;
      color: #e8eaf0;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
    }
    input:focus, select:focus { border-color: #4f6ef7; }
    button {
      width: 100%;
      padding: 12px;
      background: #4f6ef7;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #3a5be0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
    .success-banner {
      background: #052e16;
      border: 1px solid #16a34a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #4ade80;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Configuración inicial</h1>
    <p class="subtitle">
      Introduce el dominio de tu cuenta MultiShop y las credenciales del administrador.
    </p>

    <p class="section-title">Empresa</p>

    <label for="domain">Dominio (sin https://)</label>
    <input
      type="text"
      id="domain"
      placeholder="mi-restaurante.multishop.es"
      autocomplete="off"
      spellcheck="false"
    />

    <div class="divider"></div>
    <p class="section-title">Credenciales del administrador</p>

    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      placeholder="admin@ejemplo.com"
      autocomplete="off"
    />

    <label for="password">Contraseña</label>
    <input
      type="password"
      id="password"
      placeholder="••••••••"
      autocomplete="off"
    />

    <div class="success-banner" id="success-banner"></div>

    <div class="divider"></div>
    <p class="section-title">Hardware</p>

    <label for="printer">Impresora térmica</label>
    <select id="printer">
      <option value="">Cargando impresoras…</option>
    </select>

    <button id="save" disabled>Verificar y acceder</button>
    <p class="error" id="error"></p>
  </div>
  <script src="setup.js"></script>
</body>
</html>
