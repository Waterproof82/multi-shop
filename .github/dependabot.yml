version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      supabase:
        patterns:
          - "@supabase/*"
      sentry:
        patterns:
          - "@sentry/*"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
    ignore:
      # Electron has breaking changes between majors — update manually
      - dependency-name: electron
        update-types: ["version-update:semver-major"]
      - dependency-name: electron-builder
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
